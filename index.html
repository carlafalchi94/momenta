<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>momenta — Come back to who you are.</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #080808;
      color: #f0ebe3;
      font-family: Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 40px 24px;
      position: relative;
      z-index: 2;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .logo {
      max-width: 180px;
      height: auto;
      margin-bottom: 48px;
      opacity: 0.85;
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(42px, 8vw, 88px);
      line-height: 0.98;
      font-weight: 400;
      letter-spacing: -0.04em;
      max-width: 700px;
    }

    .sub {
      margin: 0 0 56px;
      max-width: 520px;
      color: #8b8480;
      font-size: 16px;
      line-height: 1.7;
    }

    .form-wrap {
      max-width: 420px;
    }

    .email-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.22);
      color: #f0ebe3;
      padding: 0 0 16px;
      font-size: 14px;
      outline: none;
    }

    .email-input::placeholder {
      color: #5e5a57;
    }

    .cta {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 18px;
      background: none;
      border: none;
      color: #faf6f0;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
    }

    .cta-line {
      width: 48px;
      height: 1px;
      background: #faf6f0;
      transition: width 0.3s ease;
    }

    .cta:hover .cta-line {
      width: 88px;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(120px);
      opacity: 0.18;
      background: radial-gradient(circle, rgba(160,150,145,0.85) 0%, rgba(8,8,8,0) 72%);
      animation: floatOrb 18s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 1;
    }

    .orb-1 {
      width: 520px;
      height: 520px;
      top: 8%;
      right: -120px;
    }

    .orb-2 {
      width: 700px;
      height: 700px;
      bottom: -240px;
      left: -180px;
      animation-duration: 24s;
    }

    @keyframes floatOrb {
      0% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(24px, -18px) scale(1.06);
      }
      100% {
        transform: translate(-30px, 20px) scale(0.96);
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 32px 20px;
      }

      .logo {
        max-width: 150px;
        margin-bottom: 40px;
      }

      .sub {
        font-size: 15px;
        margin-bottom: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <main class="page">
    <div class="container">
      <img src="black_h.png" alt="Momenta logo" class="logo" />

      <h1>Come back to<br>who you are.</h1>

      <p class="sub">
        A daily return to self through alignment and deliberate connection.
      </p>

      <div class="form-wrap">
        <input type="email" placeholder="Email Address" class="email-input" />
        <button class="cta" type="button">
          <span>Join the waitlist</span>
          <span class="cta-line"></span>
        </button>
      </div>
    </div>
  </main>
</body>
</html>
