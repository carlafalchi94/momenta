<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>momenta — Come back to who you are.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #080808;
    }

    body {
      min-height: 100vh;
      color: #f0ebe3;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 9999px;
      pointer-events: none;
      filter: blur(100px);
      will-change: transform, opacity;
      background: radial-gradient(
        circle,
        rgba(165, 158, 152, 0.95) 0%,
        rgba(110, 104, 99, 0.5) 30%,
        rgba(8, 8, 8, 0) 70%
      );
    }

    .orb-1 {
      width: 700px;
      height: 700px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.72;
      animation: gravityPulse 5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      z-index: 2;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      position: relative;
      text-align: center;
    }

    .logo-wrap {
      position: fixed;
      top: 42px;
      left: 0;
      right: 0;
      max-width: 1148px;
      margin: 0 auto;
      padding: 0 24px;
      z-index: 3;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .logo {
      max-width: 180px;
      height: auto;
      opacity: 1 !important;
      display: block;
    }

    .content {
      padding-top: 0;
    }

    .headline {
      margin: 0 0 20px;
      max-width: 100%;
      font-family: "Neue Haas Grotesk Display Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: clamp(38px, 7vw, 76px);
      line-height: 0.96;
      font-weight: 400;
      letter-spacing: -0.05em;
      color: rgba(240, 235, 227, 0.75);
      animation: fadeUp 2.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(48px);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0px);
      }
    }

    .subtext {
      margin: 0 0 56px;
      max-width: 100%;
      font-family: 'DM Mono', monospace;
      color: #8b8480;
      font-size: 14px;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    .form-wrap {
      max-width: 100%;
    }

    .email-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.22);
      color: #f0ebe3;
      padding: 0 0 16px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      border-radius: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    .email-input::placeholder {
      color: #5e5a57;
      opacity: 1;
    }

    .email-input:focus {
      border-bottom-color: #f0ebe3;
    }

    .cta {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: none;
      border: none;
      color: #faf6f0;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
    }

    .cta-line {
      width: 48px;
      height: 1px;
      background: #faf6f0;
      transition: width 0.3s ease;
    }

    .cta:hover .cta-line {
      width: 88px;
    }

    .ml-success-message {
      margin-top: 28px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8b8480;
    }

    @keyframes gravityPulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.72;
        filter: blur(100px);
      }
      35% {
        transform: translate(-50%, -50%) scale(0.55);
        opacity: 0.95;
        filter: blur(60px);
      }
      60% {
        transform: translate(-50%, -50%) scale(0.38);
        opacity: 1;
        filter: blur(40px);
      }
      80% {
        transform: translate(-50%, -50%) scale(0.62);
        opacity: 0.88;
        filter: blur(70px);
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.72;
        filter: blur(100px);
      }
    }

    @media (max-width: 768px) {
      body {
        overflow-x: hidden;
        overflow-y: auto;
      }

      .logo-wrap {
        top: 32px;
        left: 0;
        right: 0;
        padding: 0 20px;
        margin: 0;
        max-width: none;
        transform: none;
        justify-content: center;
      }

      .logo {
        max-width: 145px;
      }

      .page {
        padding: 32px 20px;
        align-items: center;
      }

      .content {
        padding-top: 0;
      }

      .subtext {
        font-size: 13px;
        margin-bottom: 44px;
      }

      .form-wrap {
        max-width: 100%;
      }

      .orb-1 {
        width: 420px;
        height: 420px;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="orb orb-1"></div>
  </div>

  <div class="logo-wrap">
    <img src="black_h.png" alt="Momenta logo" class="logo" />
  </div>

  <main class="page">
    <div class="container">
      <div class="content">
        <h1 class="headline">Come back to<br>who you are.</h1>

        <p class="subtext">
          A moment to remember who you are.
        </p>

        <form
          class="form-wrap ml-block-form ml-subscribe-form ml-subscribe-form-38839695"
          action="https://assets.mailerlite.com/jsonp/2213974/forms/182707388094088435/subscribe"
          method="post"
          target="ml-hidden-frame"
          id="ml-form-38839695"
        >
          <input
            type="email"
            name="fields[email]"
            placeholder="Email Address"
            class="email-input"
            autocomplete="email"
            aria-label="Email Address"
            aria-required="true"
            required
          />

          <input type="hidden" name="ml-submit" value="1" />
          <input type="hidden" name="anticsrf" value="true" />

          <button class="cta" type="submit">
            <span>Join the waitlist</span>
            <span class="cta-line"></span>
          </button>
        </form>

        <iframe name="ml-hidden-frame" id="ml-hidden-frame" style="display:none;"></iframe>

        <div class="ml-success-message" id="ml-success-38839695" style="display:none;">
          You’re on the list.
        </div>
      </div>
    </div>
  </main>

  <script>
    const mlForm = document.getElementById('ml-form-38839695');
    const mlIframe = document.getElementById('ml-hidden-frame');
    const mlSuccess = document.getElementById('ml-success-38839695');

    let mlSubmitted = false;

    if (mlForm) {
      mlForm.addEventListener('submit', function () {
        mlSubmitted = true;
      });
    }

    if (mlIframe) {
      mlIframe.addEventListener('load', function () {
        if (!mlSubmitted) return;

        if (mlForm) mlForm.style.display = 'none';
        if (mlSuccess) mlSuccess.style.display = 'block';
      });
    }
  </script>
</body>
</html>
