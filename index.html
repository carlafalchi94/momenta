<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>momenta — Come back to who you are.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #080808;
    }

    body {
      min-height: 100vh;
      color: #f0ebe3;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 9999px;
      pointer-events: none;
      filter: blur(120px);
      will-change: transform;
      background: radial-gradient(
        circle,
        rgba(165, 158, 152, 0.9) 0%,
        rgba(110, 104, 99, 0.45) 35%,
        rgba(8, 8, 8, 0) 75%
      );
    }

    .orb-1 {
      width: 620px;
      height: 620px;
      top: 0;
      right: -120px;
      opacity: 0.48;
      animation: moveOrb1 12s ease-in-out infinite;
    }

    .orb-2 {
      width: 760px;
      height: 760px;
      bottom: -220px;
      left: -160px;
      opacity: 0.38;
      animation: moveOrb2 15s ease-in-out infinite;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 40px 24px;
      position: relative;
      z-index: 2;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
    }

    .logo-wrap {
      position: fixed;
      top: 42px;
      left: 24%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .logo {
      max-width: 180px;
      height: auto;
      opacity: 0.92;
      display: block;
    }

    .content {
      padding-top: 84px;
    }

    .headline {
      margin: 0 0 20px;
      max-width: 760px;
      font-family: "Neue Haas Grotesk Display Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: clamp(38px, 7vw, 76px);
      line-height: 0.96;
      font-weight: 400;
      letter-spacing: -0.05em;
      color: rgba(240, 235, 227, 0.75);
    }

    .subtext {
      margin: 0 0 56px;
      max-width: 520px;
      font-family: 'DM Mono', monospace;
      color: #8b8480;
      font-size: 14px;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    .form-wrap {
      max-width: 420px;
    }

    .email-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.22);
      color: #f0ebe3;
      padding: 0 0 16px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      border-radius: 0;
    }

    .email-input::placeholder {
      color: #5e5a57;
      opacity: 1;
    }

    .email-input:focus {
      border-bottom-color: #f0ebe3;
    }

    .cta {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 18px;
      background: none;
      border: none;
      color: #faf6f0;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
    }

    .cta-line {
      width: 48px;
      height: 1px;
      background: #faf6f0;
      transition: width 0.3s ease;
    }

    .cta:hover .cta-line {
      width: 88px;
    }

    @keyframes moveOrb1 {
      0% {
        transform: translate(0px, 0px) scale(1);
      }
      25% {
        transform: translate(-30px, 20px) scale(1.06);
      }
      50% {
        transform: translate(-60px, 40px) scale(1.12);
      }
      75% {
        transform: translate(-20px, -10px) scale(1.04);
      }
      100% {
        transform: translate(20px, -30px) scale(0.96);
      }
    }

    @keyframes moveOrb2 {
      0% {
        transform: translate(0px, 0px) scale(1);
      }
      25% {
        transform: translate(30px, -20px) scale(1.04);
      }
      50% {
        transform: translate(55px, -40px) scale(1.1);
      }
      75% {
        transform: translate(10px, 10px) scale(1.02);
      }
      100% {
        transform: translate(-25px, 30px) scale(0.95);
      }
    }

    @media (max-width: 768px) {
      body {
        overflow-x: hidden;
        overflow-y: auto;
      }

      .logo-wrap {
        top: 32px;
      }

      .logo {
        max-width: 145px;
      }

      .page {
        padding: 32px 20px;
      }

      .content {
        padding-top: 74px;
      }

      .subtext {
        font-size: 13px;
        margin-bottom: 44px;
      }

      .form-wrap {
        max-width: 100%;
      }

      .orb-1 {
        width: 420px;
        height: 420px;
        top: 8%;
        right: -160px;
      }

      .orb-2 {
        width: 520px;
        height: 520px;
        bottom: -220px;
        left: -170px;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="logo-wrap">
    <img src="black_h.png" alt="Momenta logo" class="logo" />
  </div>

  <main class="page">
    <div class="container">
      <div class="content">
        <h1 class="headline">Come back to<br>who you are.</h1>

        <p class="subtext">
          A daily return to self through alignment and deliberate connection.
        </p>

        <div class="form-wrap">
          <input
            type="email"
            placeholder="Email Address"
            class="email-input"
          />

          <button class="cta" type="button">
            <span>Join the waitlist</span>
            <span class="cta-line"></span>
          </button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
