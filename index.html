<style>
        body {
            background-color: #080808;
            color: #f0ebe3;
            -webkit-font-smoothing: antialiased;
        }
        .instrument-serif { font-family: 'Instrument Serif', serif; }
        .dm-mono { font-family: 'DM Mono', monospace; }
        
        /* Orb Animations */
        .orb-blur {
            filter: blur(120px);
            opacity: 0.25;
            background: radial-gradient(circle, rgba(154, 148, 142, 0.8) 0%, rgba(8, 8, 8, 0) 75%);
            animation: orb-breathe 25s ease-in-out infinite alternate;
            will-change: transform;
        }
    
        @keyframes orb-breathe {
            0% {
                transform: scale(1) translate(0, 0) rotate(0deg);
            }
            50% {
                transform: scale(1.15) translate(5%, -5%) rotate(5deg);
            }
            100% {
                transform: scale(0.95) translate(-8%, 4%) rotate(-5deg);
            }
        }

        /* Cinematic Entrance Animations */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-cinematic {
            animation: fadeSlideUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }

        .delay-300 { animation-delay: 0.3s; }
        .delay-600 { animation-delay: 0.6s; }
    </style>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>

</div>
<!-- Waitlist Form -->

</div>
